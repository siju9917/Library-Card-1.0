name: Deploy Pages

# Deploys docs/ to GitHub Pages on every push to main.
# View the status (and any errors) at: Actions → Deploy Pages
#
# ONE-TIME SETUP — go to Settings → Pages and set the Source to
# "GitHub Actions" (not "Deploy from a branch"). Once you do that, this
# workflow will deploy every push to main within 1–2 minutes, and you
# get an explicit "Deployed" marker you can see.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Standard Pages permissions
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel older in-flight runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Write .nojekyll so Pages serves files verbatim
        run: touch docs/.nojekyll
      - name: Upload docs/
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
